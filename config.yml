# 站点基础信息（统一YAML冒号语法）
baseURL: "https://power-en.github.io/"
languageCode: zh-cn
defaultContentLanguage: zh-cn
hasCJKLanguage: true
title: "硬件工程师作品集"
theme: PaperMod
paginationSize: 10

# 全局参数
params:
  author: "Harley.wang"
  description: "硬件PCB、嵌入式、电源设计技术笔记"
  defaultTheme: auto
  ShowToc: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowSummary: true
  search: true
  # 首页读取projects为主要内容区
  mainSections: ["projects"]

# 顶部导航菜单
menu:
  main:
    - name: 首页
      url: /
      weight: 1
    - name: 项目
      url: /projects/
      weight: 2
    - name: 技能
      url: /skills/
      weight: 3
    - name: 关于我
      url: /about/
      weight: 4

# 分类/标签配置（修正格式）
taxonomies:
  tag: tags
  category: categories
